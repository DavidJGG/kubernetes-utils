apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wiredbrain.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Plain-text credentials stored in Kubernetes Secret
  password: {{ .Values.database.password | quote }}
  postgres-connection: {{ printf "Host=products-db;Database=postgres;Username=postgres;Password=%s" .Values.database.password | quote }}
  go-connection: {{ printf "host=products-db user=postgres password=%s dbname=postgres sslmode=disable" .Values.database.password | quote }}
