apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wiredbrain.fullname" . }}-database
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wiredbrain.labels" . | nindent 4 }}
    component: database
spec:
  replicas: {{ .Values.replicaCount.database }}
  selector:
    matchLabels:
      {{- include "wiredbrain.selectorLabels" . | nindent 6 }}
      component: database
  template:
    metadata:
      labels:
        {{- include "wiredbrain.selectorLabels" . | nindent 8 }}
        component: database
    spec:
      containers:
      - name: postgres
        image: {{ include "wiredbrain.image" (dict "root" . "image" .Values.image.database) }}
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: password
        resources:
          {{- toYaml .Values.resources.database | nindent 10 }}
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: products-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wiredbrain.labels" . | nindent 4 }}
    component: database
spec:
  selector:
    {{- include "wiredbrain.selectorLabels" . | nindent 4 }}
    component: database
  ports:
  - port: {{ .Values.service.database.port }}
    targetPort: 5432
  type: {{ .Values.service.database.type }}
