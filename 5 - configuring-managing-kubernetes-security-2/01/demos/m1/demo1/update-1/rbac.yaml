apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: default-pod-admin
  namespace: default 
  labels:
    wiredbrain: kube-explorer
rules:
- apiGroups: [""] #core
  resources: ["pods"]
  verbs: ["get", "list", "delete"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-explorer
  labels:
    wiredbrain: kube-explorer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kube-explorer-default
  namespace: default 
  labels:
    wiredbrain: kube-explorer
subjects:
- kind: ServiceAccount
  name: kube-explorer
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: default-pod-admin