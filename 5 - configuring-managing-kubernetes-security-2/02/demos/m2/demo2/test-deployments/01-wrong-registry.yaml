apiVersion: v1
kind: Pod
metadata:
  name: test-wrong-registry
  namespace: default
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
  containers:
  - name: nginx
    # Violates registry restriction policy
    # Must use ghcr.io/wiredbrain/ registry
    image: docker.io/nginx:latest
    command: ["sleep", "infinity"]
