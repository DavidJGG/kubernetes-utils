apiVersion: v1
kind: Pod
metadata:
  name: test-compliant
  namespace: default
spec:
  # Complies with all security policies:
  # ✓ Image from approved registry (ghcr.io/wiredbrain/)
  # ✓ Runs as non-root user
  # ✓ Image has no critical CVEs
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
  containers:
  - name: api
    image: ghcr.io/wiredbrain/products-api:k8s-security-m2
    command: ["sleep", "infinity"]
